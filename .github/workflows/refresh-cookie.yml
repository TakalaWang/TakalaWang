name: Refresh GitHub Cookie

on:
  schedule:
    - cron: '0 0 * * 0' # every Sunday midnight UTC
  workflow_dispatch: # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install playwright otplib

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Login to GitHub and extract cookie
        id: login
        run: |
          node << 'SCRIPT'
          const { chromium } = require('playwright');
          const { authenticator } = require('otplib');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext();
            const page = await context.newPage();

            // Navigate to GitHub login
            await page.goto('https://github.com/login');
            await page.fill('#login_field', process.env.GH_USERNAME);
            await page.fill('#password', process.env.GH_PASSWORD);
            await page.click('[name="commit"]');

            // Handle 2FA — GitHub may show passkey prompt first
            await page.waitForTimeout(3000);

            // If passkey prompt appears, click "Use your authenticator app" or similar
            const altMethodLink = await page.$('a:has-text("authenticator"), a:has-text("another method"), a:has-text("other method"), button:has-text("authenticator")');
            if (altMethodLink) {
              console.log('Found alternative method link, clicking...');
              await altMethodLink.click();
              await page.waitForTimeout(2000);
            }

            // Try to find TOTP input with multiple possible selectors
            const totpInput = await page.$('#app_totp') || await page.$('input[name="app_otp"]') || await page.$('input[type="text"][autocomplete="one-time-code"]');
            if (totpInput) {
              console.log('Found TOTP input, entering code...');
              const totp = authenticator.generate(process.env.TOTP_SECRET);
              await totpInput.fill(totp);
              // Click verify button if present
              const verifyBtn = await page.$('button:has-text("Verify"), button[type="submit"]');
              if (verifyBtn) await verifyBtn.click();
              await page.waitForTimeout(5000);
            } else {
              console.log('No TOTP input found, taking screenshot for debug...');
              console.log('Page URL:', page.url());
              console.log('Page title:', await page.title());
            }

            // Wait for redirect to dashboard
            await page.waitForURL('https://github.com/**', { timeout: 15000 }).catch(() => {
              console.log('Final URL:', page.url());
            });

            // Extract user_session cookie
            const cookies = await context.cookies('https://github.com');
            const session = cookies.find(c => c.name === 'user_session');

            if (!session) {
              console.error('Failed to get user_session cookie');
              console.log('Available cookies:', cookies.map(c => c.name).join(', '));
              process.exit(1);
            }

            fs.writeFileSync('cookie_value.txt', session.value);
            console.log('Cookie extracted successfully');

            await browser.close();
          })();
          SCRIPT
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}

      - name: Update GH_COOKIE secret
        run: |
          COOKIE=$(cat cookie_value.txt)
          gh secret set GH_COOKIE --repo TakalaWang/TakalaWang --body "$COOKIE"
          echo "GH_COOKIE secret updated successfully"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
