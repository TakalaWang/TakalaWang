name: Refresh GitHub Cookie

on:
  schedule:
    - cron: '0 0 * * 0' # every Sunday midnight UTC
  workflow_dispatch: # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install playwright

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Login to GitHub and extract cookie
        id: login
        run: |
          node << 'SCRIPT'
          const { chromium } = require('playwright');
          const crypto = require('crypto');
          const fs = require('fs');

          function generateTOTP(secret) {
            const base32 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let bits = '';
            for (const c of secret.toUpperCase().replace(/=+$/g, '')) {
              bits += base32.indexOf(c).toString(2).padStart(5, '0');
            }
            const key = Buffer.from(bits.match(/.{8}/g).map(b => parseInt(b, 2)));
            const time = Math.floor(Date.now() / 30000);
            const buf = Buffer.alloc(8);
            buf.writeBigInt64BE(BigInt(time));
            const hmac = crypto.createHmac('sha1', key).update(buf).digest();
            const off = hmac[hmac.length - 1] & 0xf;
            const code = ((hmac[off] & 0x7f) << 24 | hmac[off+1] << 16 | hmac[off+2] << 8 | hmac[off+3]) % 1000000;
            return code.toString().padStart(6, '0');
          }

          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext();
            const page = await context.newPage();

            // Navigate to GitHub login
            await page.goto('https://github.com/login');
            await page.fill('#login_field', process.env.GH_USERNAME);
            await page.fill('#password', process.env.GH_PASSWORD);
            await page.click('[name="commit"]');

            // Wait for 2FA page
            await page.waitForSelector('#app_totp', { timeout: 10000 });
            console.log('2FA page loaded:', page.url());

            // Generate TOTP as late as possible to avoid timing issues
            const totp = generateTOTP(process.env.TOTP_SECRET);
            console.log('TOTP generated, length:', totp.length);

            // Fill and submit immediately
            await page.fill('#app_totp', totp);
            await page.keyboard.press('Enter');

            // Wait for redirect — if code was wrong, we stay on /sessions/
            try {
              await page.waitForURL(/github\.com\/(?!sessions)/, { timeout: 20000 });
              console.log('Login complete:', page.url());
            } catch (e) {
              // Maybe code expired, try once more with fresh code
              console.log('First attempt failed, retrying with fresh TOTP...');
              const totp2 = generateTOTP(process.env.TOTP_SECRET);
              await page.fill('#app_totp', '');
              await page.fill('#app_totp', totp2);
              await page.keyboard.press('Enter');
              await page.waitForURL(/github\.com\/(?!sessions)/, { timeout: 20000 });
              console.log('Login complete on retry:', page.url());
            }

            // Extract user_session cookie
            const cookies = await context.cookies('https://github.com');
            const session = cookies.find(c => c.name === 'user_session');

            if (!session) {
              console.error('Failed to get user_session cookie');
              console.log('Available cookies:', cookies.map(c => c.name).join(', '));
              process.exit(1);
            }

            fs.writeFileSync('cookie_value.txt', session.value);
            console.log('Cookie extracted successfully');

            await browser.close();
          })();
          SCRIPT
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}

      - name: Update GH_COOKIE secret
        run: |
          COOKIE=$(cat cookie_value.txt)
          gh secret set GH_COOKIE --repo TakalaWang/TakalaWang --body "$COOKIE"
          echo "GH_COOKIE secret updated successfully"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
