name: Refresh GitHub Cookie

on:
  schedule:
    - cron: '0 0 * * 0' # every Sunday midnight UTC
  workflow_dispatch: # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install playwright otplib

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Login to GitHub and extract cookie
        id: login
        run: |
          node << 'SCRIPT'
          const { chromium } = require('playwright');
          const { authenticator } = require('otplib');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext();
            const page = await context.newPage();

            // Navigate to GitHub login
            await page.goto('https://github.com/login');
            await page.fill('#login_field', process.env.GH_USERNAME);
            await page.fill('#password', process.env.GH_PASSWORD);
            await page.click('[name="commit"]');

            // Handle 2FA — dump page to find the right selectors
            await page.waitForTimeout(3000);
            console.log('After login - URL:', page.url());

            // Log all links and buttons on the page for debugging
            const elements = await page.$$eval('a, button', els =>
              els.map(e => ({ tag: e.tagName, text: e.textContent.trim().substring(0, 80), href: e.href || '' }))
                .filter(e => e.text.length > 0)
            );
            console.log('Page elements:', JSON.stringify(elements, null, 2));

            // Log all input fields
            const inputs = await page.$$eval('input', els =>
              els.map(e => ({ name: e.name, id: e.id, type: e.type, autocomplete: e.autocomplete }))
            );
            console.log('Input fields:', JSON.stringify(inputs));

            // Try clicking any link that might lead to TOTP
            for (const text of ['authenticator', 'another way', 'other method', 'Use a', 'code', 'totp', 'one-time']) {
              const link = await page.$(`a:has-text("${text}"), button:has-text("${text}")`);
              if (link) {
                console.log('Clicking link with text containing:', text);
                await link.click();
                await page.waitForTimeout(2000);
                break;
              }
            }

            // Log page state after clicking
            console.log('After click - URL:', page.url());
            const inputs2 = await page.$$eval('input', els =>
              els.map(e => ({ name: e.name, id: e.id, type: e.type, autocomplete: e.autocomplete }))
            );
            console.log('Input fields after:', JSON.stringify(inputs2));

            // Try all possible TOTP input selectors
            const totpInput = await page.$('#app_totp')
              || await page.$('input[name="app_otp"]')
              || await page.$('input[autocomplete="one-time-code"]')
              || await page.$('input[name="otp"]')
              || await page.$('input[type="text"]');

            if (totpInput) {
              console.log('Found TOTP input, entering code...');
              const totp = authenticator.generate(process.env.TOTP_SECRET);
              await totpInput.fill(totp);
              const verifyBtn = await page.$('button[type="submit"], button:has-text("Verify")');
              if (verifyBtn) await verifyBtn.click();
              await page.waitForTimeout(5000);
            } else {
              console.log('No TOTP input found');
            }

            // Wait for redirect to dashboard
            await page.waitForURL('https://github.com/**', { timeout: 15000 }).catch(() => {
              console.log('Final URL:', page.url());
            });

            // Extract user_session cookie
            const cookies = await context.cookies('https://github.com');
            const session = cookies.find(c => c.name === 'user_session');

            if (!session) {
              console.error('Failed to get user_session cookie');
              console.log('Available cookies:', cookies.map(c => c.name).join(', '));
              process.exit(1);
            }

            fs.writeFileSync('cookie_value.txt', session.value);
            console.log('Cookie extracted successfully');

            await browser.close();
          })();
          SCRIPT
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}

      - name: Update GH_COOKIE secret
        run: |
          COOKIE=$(cat cookie_value.txt)
          gh secret set GH_COOKIE --repo TakalaWang/TakalaWang --body "$COOKIE"
          echo "GH_COOKIE secret updated successfully"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
